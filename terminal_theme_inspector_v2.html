<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Terminal Theme Inspector</title>
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  .wrap { display: flex; flex-direction: column; height: 100vh; font-family: monospace; font-size: 14px; overflow: hidden; }

  .topbar { height: 50px; border-bottom: 1px solid #1e1e2e; display: flex; align-items: center; padding: 0 16px; gap: 10px; flex-shrink: 0; background: #0d0d15; }
  .topbar-icon { padding: 6px; border-radius: 6px; display: flex; transition: background 0.25s; }
  .badge { font-size: 11px; border: 1px solid; padding: 3px 10px; border-radius: 20px; letter-spacing: 0.08em; transition: color 0.25s, border-color 0.25s; }

  .theme-bar { height: 44px; border-bottom: 1px solid #1e1e2e; display: flex; align-items: center; padding: 0 12px; gap: 4px; flex-shrink: 0; background: #0a0a0f; overflow-x: auto; }
  .theme-bar::-webkit-scrollbar { height: 0; }
  .theme-tab { padding: 5px 13px; border-radius: 20px; border: 1px solid transparent; font-family: monospace; font-size: 12px; cursor: pointer; background: transparent; color: #4a5070; transition: all 0.15s; white-space: nowrap; }
  .theme-tab:hover { background: rgba(255,255,255,0.06); color: #a9b1d6; }
  .theme-tab.active { font-weight: 700; color: #0d0d15; }
  .custom-tab { border-color: #3a3a5a; color: #7070a0; }
  .custom-tab.active { border-color: transparent; }

  .mode-toggle { margin-left: auto; display: flex; gap: 2px; background: rgba(255,255,255,0.04); border-radius: 20px; padding: 3px; flex-shrink: 0; }
  .mode-btn { padding: 3px 11px; border-radius: 20px; border: none; font-family: monospace; font-size: 11px; cursor: pointer; background: transparent; color: #4a5070; transition: all 0.15s; }
  .mode-btn.active { background: #1e1e2e; color: #c0caf5; }
  .mode-btn:disabled { opacity: 0.3; cursor: default; }

  .content { display: flex; flex: 1; overflow: hidden; }
  .sidebar { width: 300px; border-right: 1px solid #1e1e2e; background: #0d0d15; overflow-y: auto; padding: 12px; flex-shrink: 0; display: flex; flex-direction: column; }
  .sidebar::-webkit-scrollbar { width: 4px; }
  .sidebar::-webkit-scrollbar-thumb { background: #2a2a3a; border-radius: 4px; }
  .main { flex: 1; overflow-y: auto; padding: 24px; transition: background 0.3s; }
  .main::-webkit-scrollbar { width: 4px; }
  .main::-webkit-scrollbar-thumb { background: #2a2a3a; border-radius: 4px; }

  .section-label { font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: #3a3a5a; font-weight: 700; margin: 16px 0 5px; }
  .section-label:first-child { margin-top: 4px; }
  .swatch-row { display: flex; align-items: center; gap: 8px; padding: 6px 8px; border-radius: 6px; cursor: crosshair; border: 1px solid transparent; transition: background 0.1s; }
  .swatch-row:hover, .swatch-row.active { background: rgba(255,255,255,0.06); border-color: rgba(255,255,255,0.1); }
  .swatch-dot { width: 28px; height: 28px; border-radius: 4px; flex-shrink: 0; border: 1px solid rgba(255,255,255,0.08); }
  .swatch-dot-sm { width: 11px; height: 11px; border-radius: 50%; flex-shrink: 0; margin: 0 8px 0 9px; }
  .swatch-info { display: flex; flex-direction: column; gap: 1px; min-width: 0; }
  .swatch-key { font-size: 12px; font-weight: 700; color: #c0caf5; line-height: 1.4; }
  .swatch-desc { font-size: 10px; color: #3a3a5a; line-height: 1.4; }
  .swatch-hex { font-size: 10px; color: #4a5070; }

  #custom-panel { display: none; flex-direction: column; flex: 1; gap: 8px; }
  .custom-textarea { flex: 1; min-height: 280px; background: #07070d; border: 1px solid #1e1e2e; border-radius: 8px; padding: 12px; font-family: monospace; font-size: 11px; color: #a9b1d6; resize: none; outline: none; line-height: 1.7; width: 100%; }
  .custom-textarea:focus { border-color: #3a3a5a; }
  .custom-textarea::placeholder { color: #252535; }
  .btn-apply { padding: 8px 0; border-radius: 6px; border: none; font-family: monospace; font-size: 12px; font-weight: 700; cursor: pointer; flex: 1; }
  .btn-export { padding: 8px 0; border-radius: 6px; background: transparent; border: 1px solid; font-family: monospace; font-size: 12px; font-weight: 700; cursor: pointer; flex: 1; }
  .btn-export:disabled { opacity: 0.25; cursor: default; }
  .err { font-size: 11px; padding: 6px 10px; border-radius: 5px; display: none; color: #f7768e; background: rgba(247,118,142,0.08); }
  .err.on { display: block; }
  .custom-hint { font-size: 10px; color: #252535; line-height: 1.7; }
  .custom-hint code { background: #1a1a2a; padding: 1px 5px; border-radius: 3px; color: #4a5070; }

  .plabel { font-size: 10px; color: #a9b1d6; opacity: 0.35; text-transform: uppercase; letter-spacing: 0.15em; margin-bottom: 8px; font-weight: 700; }
  .pblock { padding: 16px; margin-bottom: 20px; font-size: 13px; line-height: 1.7; }
  .highlight { outline: 2px solid rgba(255,255,255,0.65); outline-offset: 1px; border-radius: 3px; }
  .empty-msg { display: flex; align-items: center; justify-content: center; height: 100%; flex-direction: column; gap: 10px; color: #3a3a5a; }
</style>
</head>
<body>
<div class="wrap">

  <div class="topbar">
    <div class="topbar-icon" id="ti">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>
    </div>
    <span style="font-weight:900;letter-spacing:-0.04em;font-size:15px;">TERMINAL <span id="tw">THEME</span></span>
    <div class="badge" id="hb" style="margin-left:auto;">HOVER TO INSPECT</div>
  </div>

  <div class="theme-bar" id="theme-bar">
    <div class="mode-toggle">
      <button class="mode-btn active" id="btn-dark"  onclick="setMode('dark')">◑ Dark</button>
      <button class="mode-btn"        id="btn-light" onclick="setMode('light')">◐ Light</button>
    </div>
  </div>

  <div class="content">
    <div class="sidebar">
      <div id="swatch-panels">
        <div class="section-label">Palette 调色板</div>
        <div id="palette-list"></div>
        <div class="section-label">Syntax 语法着色</div>
        <div id="syntax-list"></div>
        <div class="section-label">Markdown 文档渲染</div>
        <div id="markdown-list"></div>
      </div>
      <div id="custom-panel">
        <div class="section-label" style="margin-top:4px;">✏ 粘贴 opencode 主题 JSON</div>
        <textarea class="custom-textarea" id="cj" placeholder='粘贴 opencode 主题 JSON…

{
  "defs": { "c1": "#7aa2f7" },
  "theme": {
    "primary":    { "dark": "c1" },
    "background": { "dark": "#1a1b26" }
  }
}'></textarea>
        <div class="err" id="cerr"></div>
        <div style="display:flex;gap:8px;">
          <button class="btn-apply"  id="btn-apply"  onclick="applyCustom()">▶ Apply</button>
          <button class="btn-export" id="btn-export" disabled onclick="exportCustom()">↓ Export</button>
        </div>
        <div class="custom-hint" style="margin-top:4px;">
          Export 下载 .json → 拷贝至 <code>~/.config/opencode/themes/</code>
        </div>
      </div>
    </div>
    <div class="main" id="main"></div>
  </div>
</div>

// ── THEME METADATA ────────────────────────────────────────────────
const META = [
  { id:'tokyonight', label:'TokyoNight', light:true  },
  { id:'poimandres', label:'Poimandres', light:true  },

// ── STATE ─────────────────────────────────────────────────────────

let mode   = 'dark';
let hov    = null;
let c      = null;   // current flat color object

};

// ── GET FLAT COLOR OBJECT ─────────────────────────────────────────
function getColors() {
  if (tid === 'custom') {
    if (!cparsed) return null;
    return resolveCustom(cparsed, mode);
  }
  const variants = T[tid];
  if (!variants) return null;
  return variants[mode] || variants.dark;
}

// ── RESOLVE CUSTOM JSON (only used for pasted themes) ─────────────
function resolveCustom(json, m) {
  const defs = json.defs || {};
  const theme = json.theme || {};
  const out = {};
  const resolve = v => (defs[v] !== undefined ? defs[v] : v);

  const get = key => {
    if (!theme[key]) return null;
    const raw = theme[key][m] !== undefined ? theme[key][m] : (theme[key].dark || '');
    return resolve(raw) || null;
  };
  const fb = (...keys) => { for (const k of keys) { const v = get(k); if (v) return v; } return '#888888'; };

  out.bg      = fb('background');
  out.bgEl    = fb('backgroundElement','backgroundPanel','background');
  out.border  = fb('border');
  out.primary = fb('primary');
  out.accent  = fb('accent','secondary');
  out.success = fb('success');
  out.warning = fb('warning');
  out.error   = fb('error');
  out.info    = fb('info');
  out.text    = fb('text');
  out.muted   = fb('textMuted','text');
  out.dAdd    = fb('diffAddedBg');
  out.dDel    = fb('diffRemovedBg');
  out.dAddFg  = fb('diffAdded','success');
  out.dDelFg  = fb('diffRemoved','error');
  out.sComment = fb('syntaxComment');
  out.sKeyword = fb('syntaxKeyword');
  out.sString  = fb('syntaxString');
  out.sNumber  = fb('syntaxNumber');
  out.sVar     = fb('syntaxVariable');
  out.sFunc    = fb('syntaxFunction');
  out.sType    = fb('syntaxType');
  out.sOp      = fb('syntaxOperator');
  out.sPunct   = fb('syntaxPunctuation');
  out.mHead    = fb('markdownHeading');
  out.mText    = fb('markdownText','text');
  out.mLink    = fb('markdownLink');
  out.mLinkTxt = fb('markdownLinkText');
  out.mCode    = fb('markdownCode');
  out.mQuote   = fb('markdownBlockQuote');
  out.mEmph    = fb('markdownEmph');
  out.mStrong  = fb('markdownStrong');
  out.mHr      = fb('markdownHorizontalRule','border');
  out.mLi      = fb('markdownListItem');
  out.mLiN     = fb('markdownListEnumeration');
  out.mImg     = fb('markdownImage');
  out.mImgTxt  = fb('markdownImageText');
  out.mCodeBlk = fb('markdownCodeBlock','markdownText');
  return out;
}

// ── APPLY THEME (single entry point) ─────────────────────────────
function apply() {
  c = getColors();
  const mainEl = document.getElementById('main');

  if (!c) {
    mainEl.style.background = '#0a0a0f';
    mainEl.innerHTML = '<div class="empty-msg"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#3a3a5a" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg><span>粘贴 JSON 并点击 Apply</span></div>';
    return;
  }

  // main background = neutral
  mainEl.style.background = c.bg;

  // chrome accents
  document.getElementById('ti').style.background = c.primary;
  document.getElementById('ti').style.color = c.bg;
  document.getElementById('tw').style.color = c.primary;
  document.getElementById('hb').style.color = c.accent;
  document.getElementById('hb').style.borderColor = c.accent;

  // active tab pill
  document.querySelectorAll('.theme-tab.active').forEach(btn => {
    btn.style.background = btn.classList.contains('custom-tab') ? c.accent : c.primary;
  });

  // custom panel buttons
  const ba = document.getElementById('btn-apply');
  const be = document.getElementById('btn-export');
  ba.style.background = c.primary;
  ba.style.color = c.bg;
  be.style.color = c.accent;
  be.style.borderColor = c.accent;

  // rebuild swatches if not blank-custom
  if (tid !== 'custom' || cparsed) {
    rebuildSwatches();
    document.getElementById('swatch-panels').style.display = 'block';
  }

  renderPreview();
}

// ── BUILD TABS ────────────────────────────────────────────────────

  const bar = document.getElementById('theme-bar');
  const toggle = bar.querySelector('.mode-toggle');
  META.forEach(m => {
    const btn = document.createElement('button');
    btn.className = 'theme-tab' + (m.custom ? ' custom-tab' : '') + (m.id === tid ? ' active' : '');
    btn.textContent = m.label;
    btn.dataset.id = m.id;
    btn.onclick = () => switchTheme(m.id);
    bar.insertBefore(btn, toggle);
  });
}

// ── SWITCH THEME ──────────────────────────────────────────────────
function switchTheme(id) {
  tid = id;

  document.querySelectorAll('.theme-tab').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.id === id);
    btn.style.background = '';
    btn.style.color = '';
  });

  const isCustom = id === 'custom';
  document.getElementById('swatch-panels').style.display = isCustom ? 'none' : 'block';
  document.getElementById('custom-panel').style.display  = isCustom ? 'flex' : 'none';

  const meta = META.find(m => m.id === id);
  const canLight = meta && meta.light;
  const btnLight = document.getElementById('btn-light');
  btnLight.disabled = !canLight;
  if (!canLight) mode = 'dark';
  document.getElementById('btn-dark').classList.toggle('active',  mode === 'dark');
  document.getElementById('btn-light').classList.toggle('active', mode === 'light');

  apply();
}

// ── MODE TOGGLE ───────────────────────────────────────────────────
function setMode(m) {
  mode = m;
  document.getElementById('btn-dark').classList.toggle('active',  m === 'dark');
  document.getElementById('btn-light').classList.toggle('active', m === 'light');
  apply();
}

      ['variable', c.sVar,     SLABELS.variable],

      ['type',     c.sType,    SLABELS.type],
      ['operator', c.sOp,      SLABELS.operator],
      ['punct',    c.sPunct,   SLABELS.punct],
      ['obj',      c.sVar,     SLABELS.obj],
    ]},
    { id:'markdown-list', shape:'ci', items:[
      ['heading', c.mHead,    MLABELS.heading],
      ['text',    c.mText,    MLABELS.text],
      ['link',    c.mLink,    MLABELS.link],
      ['linkTxt', c.mLinkTxt, MLABELS.linkTxt],
      ['code',    c.mCode,    MLABELS.code],
      ['quote',   c.mQuote,   MLABELS.quote],
      ['emph',    c.mEmph,    MLABELS.emph],
      ['strong',  c.mStrong,  MLABELS.strong],
      ['hr',      c.mHr,      MLABELS.hr],
      ['li',      c.mLi,      MLABELS.li],
      ['liN',     c.mLiN,     MLABELS.liN],
      ['img',     c.mImg,     MLABELS.img],
      ['imgTxt',  c.mImgTxt,  MLABELS.imgTxt],
      ['codeBlk', c.mCodeBlk, MLABELS.codeBlk],
    ]},
  ];

  groups.forEach(g => {
    const el = document.getElementById(g.id);
    el.innerHTML = '';
    g.items.forEach(([key, color, desc]) => {
      const row = document.createElement('div');
      row.className = 'swatch-row';
      row.id = `sw-${g.id}-${key}`;
      const dot = document.createElement('div');
      dot.className = g.shape === 'sq' ? 'swatch-dot' : 'swatch-dot-sm';
      dot.style.background = color;
      row.appendChild(dot);
      const info = document.createElement('div');
      info.className = 'swatch-info';
      info.innerHTML = `<span class="swatch-key">${key}</span><span class="swatch-desc">${desc}</span><span class="swatch-hex">${color}</span>`;
      row.appendChild(info);
      row.addEventListener('mouseenter', () => { hov = `${g.id}-${key}`; renderPreview(); });
      row.addEventListener('mouseleave', () => { hov = null; renderPreview(); });
      el.appendChild(row);
    });
  });
}

// ── CUSTOM JSON ───────────────────────────────────────────────────
function applyCustom() {
  const raw = document.getElementById('cj').value.trim();
  const errEl = document.getElementById('cerr');
  if (!raw) { errEl.textContent = '⚠ 请粘贴 JSON 内容'; errEl.className = 'err on'; return; }
  let parsed;
  try { parsed = JSON.parse(raw); } catch(e) { errEl.textContent = '⚠ JSON 解析错误：' + e.message; errEl.className = 'err on'; return; }
  if (!parsed.theme) { errEl.textContent = '⚠ 缺少 "theme" 字段'; errEl.className = 'err on'; return; }
  errEl.className = 'err';
  cparsed = parsed;
  document.getElementById('btn-export').disabled = false;
  apply();
}

function exportCustom() {
  if (!cparsed) return;
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([JSON.stringify(cparsed, null, 2)], {type:'application/json'}));
  a.download = 'my-theme.json';
  a.click();
}
