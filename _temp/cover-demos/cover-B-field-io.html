<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ORCA Cover · Field.io 运动诗学</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400&family=Inter:wght@100;200;300;400&family=Newsreader:ital,wght@0,200;0,300;1,200;1,300&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }

:root {
  --tb: #0C0C11;
  --acc: #002FA7;
  --tw: #C8C8DC;
  --td: #828296;
  --ta: #A78BFA;
  --tg: #34D399;
  --ty: #FBBF24;
  --tr: #F87171;
}

body {
  background: var(--tb);
  color: var(--tw);
  font-family: 'Inter', -apple-system, sans-serif;
  overflow: hidden;
  width: 100vw;
  height: 100vh;
}

.cover {
  position: relative;
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* 顶部 IKB 光带 */
.top-beam {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, transparent 0%, var(--acc) 50%, transparent 100%);
  opacity: 0;
  animation: beam-sweep 4s ease-out 0.5s forwards;
}
@keyframes beam-sweep {
  0% { opacity:0; transform:scaleX(0); }
  40% { opacity:1; transform:scaleX(1); }
  100% { opacity:.6; transform:scaleX(1); }
}

/* 左下数据瀑布 */
.data-waterfall {
  position: absolute;
  bottom: 48px;
  left: 48px;
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  line-height: 1.9;
  color: var(--td);
  opacity: 0;
  animation: fadeUp .8s ease-out .3s forwards;
}
@keyframes fadeUp {
  from { opacity:0; transform:translateY(12px); }
  to { opacity:1; transform:translateY(0); }
}

.data-waterfall .row {
  display: flex;
  align-items: center;
  gap: 10px;
  white-space: nowrap;
}
.data-waterfall .label {
  color: var(--td);
  min-width: 90px;
  text-align: right;
}
.data-waterfall .val {
  color: var(--tw);
  font-weight: 400;
}
.data-waterfall .val.accent {
  color: var(--ta);
}
.data-waterfall .val.green {
  color: var(--tg);
}
.data-waterfall .val.yellow {
  color: var(--ty);
}

/* 进度条 */
.bar-track {
  width: 140px;
  height: 3px;
  background: rgba(255,255,255,.06);
  border-radius: 1.5px;
  overflow: hidden;
  position: relative;
}
.bar-fill {
  height: 100%;
  border-radius: 1.5px;
  width: 0%;
  transition: width 2s cubic-bezier(.22,1,.36,1);
}
.bar-fill.blue { background: var(--acc); }
.bar-fill.green { background: var(--tg); }
.bar-fill.yellow { background: var(--ty); }

/* 中右主标题 */
.hero-title {
  position: absolute;
  right: 80px;
  top: 50%;
  transform: translateY(-50%);
  text-align: right;
  opacity: 0;
  animation: titleIn 1.2s cubic-bezier(.22,1,.36,1) .8s forwards;
}
@keyframes titleIn {
  from { opacity:0; transform:translateY(-50%) translateX(20px); }
  to { opacity:1; transform:translateY(-50%) translateX(0); }
}

.hero-title .product-tag {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: .2em;
  color: var(--td);
  margin-bottom: 16px;
}
.hero-title .main-line {
  font-family: 'Newsreader', serif;
  font-weight: 200;
  font-size: 52px;
  line-height: 1.2;
  color: var(--tw);
  letter-spacing: -.02em;
}
.hero-title .main-line em {
  font-style: italic;
  color: var(--ta);
  font-weight: 300;
}
.hero-title .sub-line {
  font-family: 'Inter', sans-serif;
  font-weight: 200;
  font-size: 14px;
  color: var(--td);
  margin-top: 20px;
  line-height: 1.7;
  max-width: 320px;
  margin-left: auto;
}

/* IKB 光点 */
.ikb-dot {
  position: absolute;
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--acc);
  box-shadow: 0 0 20px 4px rgba(0,47,167,.5), 0 0 60px 12px rgba(0,47,167,.2);
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  opacity: 0;
  animation: dotPulse 3s ease-in-out 1.5s infinite;
}
@keyframes dotPulse {
  0%, 100% { opacity:.4; transform:translate(-50%,-50%) scale(1); }
  50% { opacity:.8; transform:translate(-50%,-50%) scale(1.3); }
}

/* 左上角 ORCA wordmark */
.wordmark {
  position: absolute;
  top: 40px;
  left: 48px;
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  letter-spacing: .15em;
  color: var(--td);
  opacity: 0;
  animation: fadeUp .6s ease-out .2s forwards;
}
.wordmark span {
  color: var(--acc);
  font-weight: 400;
}

/* 右下角版本 */
.version {
  position: absolute;
  bottom: 48px;
  right: 80px;
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  letter-spacing: .1em;
  color: rgba(130,130,150,.4);
  opacity: 0;
  animation: fadeUp .6s ease-out 2s forwards;
}

/* 背景网格 */
.grid-bg {
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,.015) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.015) 1px, transparent 1px);
  background-size: 80px 80px;
  pointer-events: none;
}

/* 数据行跳动动画 */
.tick { display: inline-block; }
</style>
</head>
<body>
<div class="cover">
  <div class="grid-bg"></div>
  <div class="top-beam"></div>
  <div class="ikb-dot"></div>

  <!-- 左上 wordmark -->
  <div class="wordmark"><span>ORCA</span> · Operator Runtime CANN Assistant</div>

  <!-- 左下数据瀑布 -->
  <div class="data-waterfall" id="waterfall">
    <div class="row">
      <span class="label">tile_m</span>
      <span class="val accent" id="tile-val">128</span>
    </div>
    <div class="row">
      <span class="label">cube_util</span>
      <div class="bar-track"><div class="bar-fill blue" id="bar-cube"></div></div>
      <span class="val" id="cube-pct">72.4%</span>
    </div>
    <div class="row">
      <span class="label">vector_util</span>
      <div class="bar-track"><div class="bar-fill green" id="bar-vec"></div></div>
      <span class="val green" id="vec-pct">88.1%</span>
    </div>
    <div class="row">
      <span class="label">memory_bw</span>
      <div class="bar-track"><div class="bar-fill yellow" id="bar-mem"></div></div>
      <span class="val yellow" id="mem-pct">67.3%</span>
    </div>
    <div class="row" style="margin-top:8px;">
      <span class="label">format</span>
      <span class="val">FRACTAL_NZ</span>
      <span style="color:var(--tg);font-size:9px;">✓</span>
    </div>
    <div class="row">
      <span class="label">target</span>
      <span class="val">910B · 310P</span>
    </div>
    <div class="row" style="margin-top:8px;">
      <span class="label">status</span>
      <span class="val green" id="status-text">converged</span>
    </div>
  </div>

  <!-- 中右主标题 -->
  <div class="hero-title">
    <div class="product-tag">CANN · 昇腾算子开发</div>
    <div class="main-line">
      昇腾算子<br>
      <em>下一代</em><br>
      开发体验
    </div>
    <div class="sub-line">
      以算子开发为场景，重新设计人与 AI 的协作界面。<br>
      让工程师把注意力集中在算法意图上，而非硬件细节。
    </div>
  </div>

  <!-- 右下版本 -->
  <div class="version">v0.9 · 2026</div>
</div>

<script>
(function initCoverAnimation() {
  const barCube = document.getElementById('bar-cube');
  const barVec = document.getElementById('bar-vec');
  const barMem = document.getElementById('bar-mem');
  const tileVal = document.getElementById('tile-val');
  const cubePct = document.getElementById('cube-pct');
  const vecPct = document.getElementById('vec-pct');
  const memPct = document.getElementById('mem-pct');
  const statusText = document.getElementById('status-text');

  setTimeout(() => {
    barCube.style.width = '72.4%';
    barVec.style.width = '88.1%';
    barMem.style.width = '67.3%';
  }, 600);

  const tileValues = [32, 64, 128, 256, 128];
  const cubeValues = [41.2, 58.7, 72.4, 69.1, 72.4];
  const vecValues = [62.3, 75.8, 88.1, 86.4, 88.1];
  const memValues = [82.1, 74.6, 67.3, 63.8, 67.3];
  const statuses = ['iterating', 'iterating', 'converged', 'regressed', 'converged'];

  let idx = 0;
  setInterval(() => {
    idx = (idx + 1) % tileValues.length;
    tileVal.textContent = tileValues[idx];
    cubePct.textContent = cubeValues[idx].toFixed(1) + '%';
    vecPct.textContent = vecValues[idx].toFixed(1) + '%';
    memPct.textContent = memValues[idx].toFixed(1) + '%';
    barCube.style.width = cubeValues[idx] + '%';
    barVec.style.width = vecValues[idx] + '%';
    barMem.style.width = memValues[idx] + '%';
    statusText.textContent = statuses[idx];
    statusText.style.color = statuses[idx] === 'converged' ? 'var(--tg)' :
                             statuses[idx] === 'regressed' ? 'var(--tr)' : 'var(--ty)';
  }, 3000);
})();
</script>
</body>
</html>
